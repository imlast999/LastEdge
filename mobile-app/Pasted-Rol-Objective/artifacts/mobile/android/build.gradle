// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

ext {
    compileSdkVersion = 36
    minSdkVersion = 24
    targetSdkVersion = 36
    REACT_NATIVE_NODE_MODULES_DIR = 'C:/BOT-MT5/mobile-app/Pasted-Rol-Objective/node_modules/react-native'
    REACT_NATIVE_WORKLETS_NODE_MODULES_DIR = 'C:/BOT-MT5/mobile-app/Pasted-Rol-Objective/node_modules/react-native-worklets'
    reactNativeAndroidRoot = 'C:/BOT-MT5/mobile-app/Pasted-Rol-Objective/node_modules/react-native/android'
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
